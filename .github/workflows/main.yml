name: Deploy Node.js App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.IP }}
          username: karan
          key: ${{ secrets.PROJECT }}
          script: |
            if [ ! -d "/home/karan/seedlyfrntd" ]; then
              git clone https://github.com/KaranManhas22/seedlyfrntd.git /home/karan/seedlyfrntd
            fi

            cd /home/karan/seedlyfrntd

            git pull origin main

            npm install

            npm run build || true

            pm2 describe app > /dev/null
            if [ $? -eq 0 ]; then
              pm2 restart app
            else
              pm2 start npm --name app -- run dev
            fi
